services:
  - type: web
    name: simulateur-ngap-kine
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_STT_MODEL
        value: gpt-4o-mini-transcribe
