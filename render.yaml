services:
  - type: web
    name: simulateur-ngap-kine
    runtime: python
    plan: starter
    buildCommand: python3 -m py_compile app.py ngap_catalog.py assistant_ngap.py analyse_message.py ngap_database.py
    startCommand: python3 app.py --mode web --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_STT_MODEL
        value: gpt-4o-mini-transcribe
