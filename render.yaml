services:
  - type: web
    name: ngap-kine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_STT_MODEL
        value: gpt-4o-mini-transcribe
      - key: OPENAI_STT_PROMPT
        value: "Transcription médicale en français pour cabinet de kinésithérapie."
      - key: STT_PROVIDER
        value: openai
      - key: NGAP_DEBUG
        value: "0"
      - key: PYTHON_VERSION
        value: "3.12"
    autoDeploy: true
    healthCheckPath: /health
    plan: free
