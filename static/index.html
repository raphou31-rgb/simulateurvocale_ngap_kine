<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2b7ca8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="NGAP Kiné">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <title>Raph ton assistant NGAP kiné</title>
    <style>
      :root {
        --bg: #f5f5f0;
        --surface: #ffffff;
        --surface-muted: #faf9f5;
        --ink: #232321;
        --muted: #76746b;
        --line: rgba(34, 35, 33, 0.08);
        --line-strong: rgba(34, 35, 33, 0.14);
        --blue: #2b7ca8;
        --blue-dark: #165270;
        --red: #da6177;
        --danger: #b55467;
        --success-bg: #eaf3de;
        --success-text: #27500a;
        --warning-bg: #faeeda;
        --warning-text: #633806;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family: system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      button,
      textarea,
      input {
        font: inherit;
      }

      button {
        min-height: 48px;
        border: 0;
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.58;
      }

      main {
        width: min(100%, 432px);
        margin: 0 auto;
        padding: 16px 16px 28px;
      }

      .screen {
        display: none;
      }

      .screen.active {
        display: block;
      }

      .topbar {
        margin-bottom: 14px;
      }

      .app-title {
        margin: 0;
        font-size: 0.98rem;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      .app-subtitle {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.94rem;
        line-height: 1.45;
      }

      .voice-panel {
        display: grid;
        justify-items: center;
        gap: 10px;
        padding: 18px 0 12px;
      }

      .voice-panel.compact {
        gap: 8px;
        padding-top: 10px;
      }

      .voice-panel.result-mode {
        padding-top: 18px;
      }

      .voice-button {
        width: 80px;
        height: 80px;
        min-height: 80px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: var(--blue);
        color: #fff;
        box-shadow: 0 14px 28px rgba(43, 124, 168, 0.22);
        transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      }

      .voice-button svg {
        display: block;
      }

      .voice-button.active,
      .voice-button.busy {
        background: var(--red);
        box-shadow: 0 14px 28px rgba(218, 97, 119, 0.26);
      }

      .voice-button.active {
        animation: pulse-mic 1.2s ease-in-out infinite;
      }

      .voice-panel.compact .voice-button {
        width: 56px;
        height: 56px;
        min-height: 56px;
      }

      .voice-panel.compact .voice-button svg {
        transform: scale(0.84);
      }

      @keyframes pulse-mic {
        0%, 100% { box-shadow: 0 0 0 0 rgba(218, 97, 119, 0.5); }
        50% { box-shadow: 0 0 0 16px rgba(218, 97, 119, 0); }
      }

      .voice-hint {
        color: var(--muted);
        font-size: 0.93rem;
        text-align: center;
        line-height: 1.4;
      }

      .input-card,
      .question-card,
      .thread-card,
      .result-card,
      .placeholder-card,
      .history-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
      }

      .input-card {
        padding: 14px;
      }

      textarea {
        width: 100%;
        min-height: 52px;
        max-height: 140px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--surface-muted);
        color: var(--ink);
        padding: 14px;
        line-height: 1.4;
      }

      .action-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 92px;
        gap: 10px;
        margin-top: 12px;
      }

      .button-primary,
      .button-secondary,
      .button-danger,
      .choice,
      .result-action,
      .history-action {
        border-radius: 14px;
      }

      .button-primary {
        background: var(--blue);
        color: #fff;
        font-weight: 600;
      }

      .button-secondary,
      .history-action {
        background: #fff;
        color: var(--ink);
        border: 1px solid var(--line-strong);
      }

      .button-danger {
        background: #f8edef;
        color: var(--danger);
        border: 1px solid rgba(181, 84, 103, 0.18);
      }

      .status {
        min-height: 24px;
        margin: 14px 2px 10px;
        font-size: 0.93rem;
        color: var(--muted);
      }

      .result {
        display: grid;
        gap: 12px;
      }

      .placeholder-card {
        padding: 16px;
        border-style: dashed;
        background: transparent;
        box-shadow: none;
      }

      .placeholder-title {
        margin: 0 0 6px;
        font-size: 0.95rem;
        font-weight: 700;
      }

      .placeholder-text {
        margin: 0;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.5;
      }

      .question-card,
      .thread-card {
        padding: 14px;
      }

      .question-head {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 8px;
      }

      .question-badge {
        width: 28px;
        height: 28px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: #eef4fb;
        color: var(--blue-dark);
        flex: 0 0 auto;
      }

      .question-label {
        margin: 0;
        font-size: 0.76rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .question-text {
        margin: 0;
        font-size: 1.08rem;
        font-weight: 700;
        line-height: 1.35;
        letter-spacing: -0.01em;
      }

      .choices {
        display: grid;
        gap: 10px;
      }

      .choice {
        width: 100%;
        background: #fff;
        color: var(--ink);
        border: 1px solid var(--line-strong);
        text-align: left;
        padding: 14px 16px;
        font-weight: 600;
      }

      .thread-title {
        margin: 0 0 12px;
        font-size: 0.86rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .thread {
        display: grid;
        gap: 10px;
      }

      .thread-turn {
        padding: 10px 12px;
        border-radius: 14px;
        line-height: 1.45;
        font-size: 0.95rem;
      }

      .thread-turn strong {
        display: block;
        margin-bottom: 4px;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .thread-turn.user {
        background: #eef4fb;
      }

      .thread-turn.assistant {
        background: #faf6f7;
      }

      .result-card {
        padding: 16px;
      }

      .result-card-main {
        display: flex;
        gap: 16px;
        align-items: flex-start;
      }

      .result-card-visual {
        flex: 0 0 100px;
        width: 100px;
        height: 150px;
        border-radius: 10px;
        overflow: hidden;
      }

      .result-card-copy {
        flex: 1 1 auto;
        min-width: 0;
      }

      .result-label {
        margin: 0 0 2px;
        font-size: 11px;
        color: #888;
      }

      .result-cotation {
        margin: 0 0 8px;
        font-size: 26px;
        line-height: 1;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .result-title {
        margin: 0 0 4px;
        font-size: 14px;
        line-height: 1.35;
        font-weight: 700;
      }

      .result-description {
        margin: 0 0 14px;
        font-size: 12px;
        color: #888;
        line-height: 1.45;
      }

      .badge-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .badge {
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
      }

      .badge.seances {
        background: #e6f1fb;
        color: #0c447c;
      }

      .badge.referentiel {
        background: var(--success-bg);
        color: var(--success-text);
      }

      .badge.opere {
        background: var(--warning-bg);
        color: var(--warning-text);
      }

      .badge.non-opere {
        background: #e1f5ee;
        color: #085041;
      }

      .result-breadcrumb {
        margin-top: 14px;
        padding-top: 10px;
        border-top: 1px solid rgba(0, 0, 0, 0.06);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 4px;
        color: #999;
        font-size: 11px;
        line-height: 1.6;
      }

      .crumb {
        padding: 2px 7px;
        border-radius: 4px;
        background: rgba(0, 0, 0, 0.04);
      }

      .crumb-sep {
        opacity: 0.3;
        margin: 0 2px;
      }

      .result-actions {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 48px;
        gap: 10px;
      }

      .result-action {
        background: #fff;
        color: var(--ink);
        border: 1px solid var(--line-strong);
        font-weight: 600;
      }

      .result-action.icon {
        padding: 0;
        display: grid;
        place-items: center;
        font-size: 1rem;
      }

      .history-link-row {
        display: flex;
        justify-content: center;
        padding: 10px 0 2px;
      }

      .history-link {
        background: transparent;
        color: var(--muted);
        text-decoration: underline;
        text-underline-offset: 3px;
        padding: 4px 8px;
        min-height: auto;
      }

      .history-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .history-title {
        margin: 0;
        font-size: 1.02rem;
      }

      .history-list {
        display: grid;
        gap: 12px;
      }

      .history-card {
        padding: 14px;
      }

      .history-meta {
        color: var(--muted);
        font-size: 0.84rem;
        line-height: 1.45;
        margin-top: 6px;
      }

      .history-prompt {
        margin-top: 10px;
        font-size: 0.94rem;
        line-height: 1.45;
      }

      .history-title-input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px;
        background: var(--surface-muted);
        color: var(--ink);
      }

      .history-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 12px;
      }

      .footer {
        width: min(100%, 432px);
        margin: 0 auto;
        padding: 0 16px 24px;
        color: var(--muted);
        font-size: 0.8rem;
        line-height: 1.5;
        text-align: center;
      }

      @media (max-width: 360px) {
        .action-row,
        .result-actions,
        .history-actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section id="screen-assistant" class="screen active">
        <header class="topbar">
          <h1 class="app-title">Assistant NGAP kiné</h1>
          <p class="app-subtitle">Décrivez le cas du patient.</p>
        </header>

        <section id="voice-panel" class="voice-panel">
          <button id="voice" class="voice-button" aria-label="Dicter"></button>
          <div id="voice-hint" class="voice-hint">Appuyez pour dicter</div>
        </section>

        <section class="input-card">
          <textarea id="message" placeholder="Ex: prothèse genou"></textarea>
          <div class="action-row">
            <button id="analyze" class="button-primary">Analyser</button>
            <button id="reset" class="button-danger">Effacer</button>
          </div>
        </section>

        <div id="status" class="status"></div>
        <section id="result" class="result"></section>
        <section id="choices" class="choices"></section>

        <div class="history-link-row">
          <button id="history-link" class="history-link">Voir l'historique</button>
        </div>
      </section>

      <section id="screen-history" class="screen">
        <header class="history-head">
          <h2 class="history-title">Historique</h2>
          <button id="history-back" class="history-link">Retour</button>
        </header>
        <div id="history" class="history-list"></div>
      </section>
    </main>

    <footer class="footer">
      Outil d'aide à la cotation NGAP kiné 2026. Les résultats doivent être vérifiés par le praticien.<br>
      Ne se substitue pas à la nomenclature officielle. Aucune donnée patient n'est stockée.
    </footer>

      let context = "";

      const MEDICAL_HINTS = [

      const MIC_ICON = `

            { type: "rect", x: 25, y: 15, width: 50, height: 110, rx: 8, opacity: 0.08 },
          ],
          label: "GENERAL",
        },
      };
      const RACHIS_ZONES = {
        rachis: { startRect: 0, endRect: 6, haloCy: 52, label: "RACHIS" },
        cervical: { startRect: 0, endRect: 1, haloCy: 36, label: "CERVICAL" },
        dorsal: { startRect: 2, endRect: 3, haloCy: 48, label: "DORSAL" },
        lombaire: { startRect: 4, endRect: 6, haloCy: 61, label: "LOMBAIRE" },
      };
      let currentRenderedAnswer = "";
      let currentRenderedMeta = null;

      if (DEBUG_LOGS) {
        console.log("[app]", {
          version: APP_VERSION,
          page_origin: window.location.origin,
          user_agent: navigator.userAgent,
        });
      }

      function buildApiUrl(path) {
        return new URL(path, window.location.origin).toString();
      }

      async function fetchJsonWithDebug(path, options = {}, timeoutMs = 15000) {
        const requestUrl = buildApiUrl(path);
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
        const pageOrigin = window.location.origin;
        const requestOrigin = new URL(requestUrl).origin;
        const sameOrigin = pageOrigin === requestOrigin;

        if (DEBUG_LOGS) {
          console.log("[network]", {
            app_version: APP_VERSION,
            request_url: requestUrl,
            page_origin: pageOrigin,
            same_origin: sameOrigin,
            timeout_ms: timeoutMs,
            method: options.method || "GET",
            user_agent: navigator.userAgent,
          });
        }

        try {
          const response = await fetch(requestUrl, {
            ...options,
            signal: controller.signal,
          });
          let data = {};
          try {
            data = await response.json();
          } catch (_) {
            data = {};
          }
          return { response, data, requestUrl, sameOrigin, timeoutMs };
        } finally {
          clearTimeout(timeoutId);
        }
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function normalizeVoiceText(text) {
        return text
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[’']/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function getHistory() {
        try {
          return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
        } catch (_) {
          return [];
        }
      }

      function setHistory(entries) {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(entries.slice(0, 30)));
      }

      function getNextHistoryNumber() {
        const current = Number(localStorage.getItem(HISTORY_COUNTER_KEY) || "1");
        localStorage.setItem(HISTORY_COUNTER_KEY, String(current + 1));
        return current;
      }

      function extractField(answer, prefixes) {
        const line = String(answer || "")
          .split("\n")
          .find((item) => prefixes.some((prefix) => item.startsWith(prefix)));
        if (!line) {
          return "";
        }
        const prefix = prefixes.find((item) => line.startsWith(item));
        return prefix ? line.replace(prefix, "").trim() : "";
      }

      function extractCotation(answer) {
        return extractField(answer, ["Cotation NGAP : ", "Cotation : "]);
      }

      function extractActe(answer) {
        return extractField(answer, ["Libellé NGAP : ", "Acte : "]);
      }

      function extractSeances(answer) {
        return extractField(answer, ["Nombre de séances max : "]);
      }

      function extractReferentiel(answer) {
        return extractField(answer, ["Référentiel : "]);
      }

      function hasMeaningfulValue(value) {
        const normalized = normalizeVoiceText(String(value || ""));
        if (!normalized) {
          return false;
        }
        return ![
          "non precise",
          "non fourni par les donnees de reference",
          "hors referentiel / non precise",
          "hors referentiel",
        ].includes(normalized);
      }

      function formatDate(value) {
        return new Date(value).toLocaleString("fr-FR", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function polishDisplayText(text) {
        return String(text || "")
          .replace(/\bReeducation\b/g, "Rééducation")
          .replace(/\breeducation\b/g, "rééducation")
          .replace(/\bprecis\b/g, "précis")
          .replace(/\bprecisee\b/g, "précisée")
          .replace(/\bpreciser\b/g, "préciser")
          .replace(/\bdetermine\b/g, "détermine")
          .replace(/\boperee\b/g, "opérée")
          .replace(/\boperes\b/g, "opérés")
          .replace(/\bnon operee\b/g, "non opérée")
          .replace(/\bnon operes\b/g, "non opérés")
          .replace(/\bdeambulation\b/g, "déambulation")
          .replace(/\bdeglutition\b/g, "déglutition")
          .replace(/\bepaule\b/g, "épaule")
          .replace(/\bseances\b/g, "séances")
          .replace(/\bnon precise\b/g, "non précisé")
          .replace(/\bQuestion : quel diagnostic precis \?/g, "Question : quel diagnostic précis ?")
          .replace(/\bQuestion : pouvez-vous preciser le diagnostic \?/g, "Question : pouvez-vous préciser le diagnostic ?");
      }

      function getColorForMeta(meta) {
        if (!meta) {
          return COLOR_MAP.corps_entier;
        }
        const tag = meta.visual_mapping?.anatomical_tag || "corps_entier";
        const famille = String((meta.path && meta.path[0]) || "");
        if (famille === "Neurologie") {
          return COLOR_MAP.neurologie;
        }
        if (famille === "Respiratoire") {
          return COLOR_MAP.respiratoire;
        }
        if (famille === "Vasculaire") {
          return COLOR_MAP.vasculaire;
        }
        return COLOR_MAP[tag] || COLOR_MAP.corps_entier;
      }

      function inferSchemaKind(meta, answer = "") {
        const normalizedSource = normalizeVoiceText([
          meta?.schema_kind,
          meta?.title,
          meta?.description,
          answer,
          ...(Array.isArray(meta?.path) ? meta.path : []),
        ].filter(Boolean).join(" "));

        if (normalizedSource.includes("genou")) return "genou";
        if (normalizedSource.includes("hanche")) return "hanche";
        if (normalizedSource.includes("cheville")) return "cheville";
        if (normalizedSource.includes("epaule")) return "epaule";
        if (normalizedSource.includes("coude")) return "coude";
        if (normalizedSource.includes("main") || normalizedSource.includes("poignet")) return "main";
        if (normalizedSource.includes("cervical")) return "cervical";
        if (normalizedSource.includes("dorsal")) return "dorsal";
        if (normalizedSource.includes("lomb")) return "lombaire";
        if (normalizedSource.includes("thorax") || normalizedSource.includes("respir")) return "thorax";
        if (normalizedSource.includes("abdomen") || normalizedSource.includes("perinee")) return "abdomen";
        return meta?.schema_kind || "default";
      }

      function renderHighlight(shape, color) {
        if (!shape) {
          return "";
        }
        if (shape.type === "circle") {
          return `<circle cx="${shape.cx}" cy="${shape.cy}" r="${shape.r}" fill="${color.fill}" opacity="${shape.opacity}"></circle>`;
        }
        if (shape.type === "ellipse") {
          return `<ellipse cx="${shape.cx}" cy="${shape.cy}" rx="${shape.rx}" ry="${shape.ry}" fill="${color.fill}" opacity="${shape.opacity}"></ellipse>`;
        }
        if (shape.type === "rect") {
          return `<rect x="${shape.x}" y="${shape.y}" width="${shape.width}" height="${shape.height}" rx="${shape.rx || 0}" fill="${color.fill}" opacity="${shape.opacity}"></rect>`;
        }
        return "";
      }

      function renderBodySchema(anatomicalTag, schemaKind, colors, label = "") {
        const tag = anatomicalTag || "corps_entier";
        const familyConfig = ZONE_CONFIG[tag] || ZONE_CONFIG.corps_entier;
        let highlightMarkup = "";
        let finalLabel = label || familyConfig.label || "GENERAL";

        if (tag === "rachis") {
          const zone = RACHIS_ZONES[schemaKind] || RACHIS_ZONES.rachis;
          const vertebrae = Array.from({ length: 7 }, (_, index) => {
            const y = [33, 38, 43, 48, 53, 59, 65][index];
            const height = [4, 4, 4, 4, 5, 5, 4][index];
            const opacity = index >= zone.startRect && index <= zone.endRect ? 0.9 : 0.3;
            return `<rect x="46" y="${y}" width="8" height="${height}" rx="1" fill="${colors.fill}" opacity="${opacity}"></rect>`;
          }).join("");
          highlightMarkup = `
            <g id="zone-rachis">${vertebrae}</g>
            <circle cx="50" cy="${zone.haloCy}" r="14" fill="${colors.fill}" opacity="0.16"></circle>
            <circle cx="50" cy="${zone.haloCy}" r="8" fill="${colors.fill}" opacity="0.34"></circle>
          `;
          finalLabel = label || zone.label;
        } else {
          const zoneDetails = familyConfig[schemaKind] || familyConfig.default || familyConfig;
          const highlights = Array.isArray(zoneDetails.highlight) ? zoneDetails.highlight : [];
          highlightMarkup = highlights.map((shape) => renderHighlight(shape, colors)).join("");
          finalLabel = label || zoneDetails.label || familyConfig.label || "GENERAL";
        }

        return `
          <svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="${escapeHtml(finalLabel)}">
            <rect width="100" height="150" rx="8" fill="${colors.bg}"></rect>
            ${highlightMarkup}
            <ellipse cx="50" cy="22" rx="9" ry="11" fill="none" stroke="${colors.stroke}" stroke-width="1.2"></ellipse>
            ${tag === "rachis" ? "" : `
              <g id="zone-rachis">
                <rect x="46" y="33" width="8" height="4" rx="1" fill="${colors.stroke}" opacity="0.3"></rect>
                <rect x="46" y="38" width="8" height="4" rx="1" fill="${colors.stroke}" opacity="0.3"></rect>
                <rect x="46" y="43" width="8" height="4" rx="1" fill="${colors.stroke}" opacity="0.3"></rect>
                <rect x="46" y="48" width="8" height="4" rx="1" fill="${colors.stroke}" opacity="0.3"></rect>
                <rect x="46" y="53" width="8" height="5" rx="1" fill="${colors.stroke}" opacity="0.3"></rect>
                <rect x="46" y="59" width="8" height="5" rx="1" fill="${colors.stroke}" opacity="0.3"></rect>
                <rect x="46" y="65" width="8" height="4" rx="1" fill="${colors.stroke}" opacity="0.3"></rect>
              </g>
            `}
            <line x1="50" y1="33" x2="50" y2="68" stroke="${colors.stroke}" stroke-width="1.5"></line>
            <g id="zone-membre-sup-gauche">
              <line x1="50" y1="42" x2="32" y2="58" stroke="${colors.stroke}" stroke-width="1.2"></line>
              <line x1="32" y1="58" x2="26" y2="72" stroke="${colors.stroke}" stroke-width="1"></line>
            </g>
            <g id="zone-membre-sup-droit">
              <line x1="50" y1="42" x2="68" y2="58" stroke="${colors.stroke}" stroke-width="1.2"></line>
              <line x1="68" y1="58" x2="74" y2="72" stroke="${colors.stroke}" stroke-width="1"></line>
            </g>
            <path d="M42 68 Q50 74 58 68" fill="none" stroke="${colors.stroke}" stroke-width="1"></path>
            <g id="zone-membre-inf-gauche">
              <line x1="44" y1="70" x2="38" y2="105" stroke="${colors.stroke}" stroke-width="1.5"></line>
              <line x1="38" y1="105" x2="34" y2="130" stroke="${colors.stroke}" stroke-width="1.2"></line>
            </g>
            <g id="zone-membre-inf-droit">
              <line x1="56" y1="70" x2="62" y2="105" stroke="${colors.stroke}" stroke-width="1.5"></line>
              <line x1="62" y1="105" x2="66" y2="130" stroke="${colors.stroke}" stroke-width="1.2"></line>
            </g>
            <text x="50" y="144" text-anchor="middle" fill="${colors.text}" style="font-size:7px;font-weight:600;">${escapeHtml(finalLabel)}</text>
          </svg>
        `;
      }

      function buildCopyString(answer) {
        const cotation = extractCotation(answer);
        const acte = extractActe(answer);
        const seances = extractSeances(answer);
        const referentiel = extractReferentiel(answer);
        const parts = [];

        if (cotation) parts.push(cotation);
        if (acte) parts.push(acte);
        if (hasMeaningfulValue(seances)) parts.push(`${seances} max`);
        if (normalizeVoiceText(referentiel) === "oui") parts.push("Référentiel");
        if (String(answer).includes("Opéré : oui")) {
          parts.push("Opéré");
        } else if (String(answer).includes("Opéré : non")) {
          parts.push("Non opéré");
        }
        return parts.join(" — ");
      }

      function renderConversationThread() {
        if (!conversationTurns.length) {
          return "";
        }
        const turns = conversationTurns.map((turn) => `
          <div class="thread-turn ${turn.role === "user" ? "user" : "assistant"}">
            <strong>${turn.role === "user" ? "Vous" : "Assistant"}</strong>
            ${escapeHtml(polishDisplayText(turn.text))}
          </div>
        `).join("");
        return `
          <section class="thread-card">
            <h3 class="thread-title">Conversation</h3>
            <div class="thread">${turns}</div>
          </section>
        `;
      }

      function renderPlaceholderState() {
        $("result").innerHTML = `
          <section class="placeholder-card">
            <p class="placeholder-title">Zone de résultat</p>
            <p class="placeholder-text">L'assistant donne une cotation finale ou pose une question courte si une précision manque.</p>
          </section>
        `;
      }

      function renderQuestionState(answer) {
        $("result").innerHTML = `
          <section class="question-card">
            <div class="question-head">
              <div class="question-badge">${QUESTION_ICON()}</div>
              <div>
                <p class="question-label">Question</p>
                <p class="question-text">${escapeHtml(polishDisplayText(answer))}</p>
              </div>
            </div>
          </section>
          ${renderConversationThread()}
        `;
      }

      function renderResultCard(meta, answer) {
        const cotation = extractCotation(answer);
        const acte = extractActe(answer);
        const seances = extractSeances(answer);
        const referentiel = extractReferentiel(answer);
        const path = Array.isArray(meta?.path) ? meta.path : [];
        const colors = getColorForMeta(meta);
        const tag = meta?.visual_mapping?.anatomical_tag || "corps_entier";
        const schemaKind = inferSchemaKind(meta, answer);
        const isOpere = String(answer).includes("Opéré : oui");
        const isNonOpere = String(answer).includes("Opéré : non");
        const bodySvg = renderBodySchema(tag, schemaKind, colors);
        let badges = "";

        if (hasMeaningfulValue(seances)) {
          badges += `<span class="badge seances">${escapeHtml(seances)} max</span>`;
        }
        if (normalizeVoiceText(referentiel) === "oui") {
          badges += `<span class="badge referentiel">Référentiel</span>`;
        }
        if (isOpere) {
          badges += `<span class="badge opere">Opéré</span>`;
        } else if (isNonOpere) {
          badges += `<span class="badge non-opere">Non opéré</span>`;
        }

        const breadcrumb = path.map((item, index) => `
          <span class="crumb">${escapeHtml(polishDisplayText(item))}</span>${index < path.length - 1 ? '<span class="crumb-sep">&#8250;</span>' : ""}
        `).join("");

        return `
          <section class="result-card">
            <div class="result-card-main">
              <div class="result-card-visual">${bodySvg}</div>
              <div class="result-card-copy">
                <p class="result-label">Cotation NGAP</p>
                <p class="result-cotation">${escapeHtml(polishDisplayText(cotation))}</p>
                <p class="result-title">${escapeHtml(polishDisplayText(acte || meta?.title || ""))}</p>
                <p class="result-description">${escapeHtml(polishDisplayText(meta?.description || ""))}</p>
                <div class="badge-row">${badges}</div>
              </div>
            </div>
            <div class="result-breadcrumb">${breadcrumb}</div>
          </section>
        `;
      }

      function attachResultActions(answer) {
        const copyButton = $("copy-result");
        const reportButton = $("report-result");

        if (copyButton) {
          copyButton.addEventListener("click", async () => {
            const formatted = buildCopyString(answer);
            if (!formatted) {
              return;
            }
            try {
              await navigator.clipboard.writeText(formatted);
              const previous = copyButton.textContent;
              copyButton.textContent = "Copié !";
              setTimeout(() => {
                copyButton.textContent = previous;
              }, 1500);
            } catch (_) {}
          });
        }

        if (reportButton) {
          reportButton.addEventListener("click", () => {
            const expected = prompt("Quelle cotation attendiez-vous ? (ex: RAM 8.09)");
            if (!expected || !expected.trim()) {
              return;
            }
            const report = {
              timestamp: new Date().toISOString(),
              input: conversationTurns
                .filter((turn) => turn.role === "user")
                .map((turn) => turn.text)
                .join(" -> "),
              cotation_donnee: extractCotation(answer),
              cotation_attendue: expected.trim(),
              answer,
            };
            const reports = JSON.parse(localStorage.getItem("ngap_error_reports") || "[]");
            reports.push(report);
            localStorage.setItem("ngap_error_reports", JSON.stringify(reports.slice(-50)));
            reportButton.textContent = "✓";
            reportButton.disabled = true;
          });
        }
      }

      function setVoicePanelMode(mode) {
        const panel = $("voice-panel");
        const hint = $("voice-hint");
        panel.classList.remove("compact", "result-mode");

        if (mode === "question") {
          panel.classList.add("compact");
          hint.textContent = "Ou répondez par voix";
          return;
        }
        if (mode === "final") {
          panel.classList.add("result-mode");
          hint.textContent = "Nouveau cas";
          return;
        }
        hint.textContent = "Appuyez pour dicter";
      }

      function renderAssistantState({ mode = "home", answer = "", meta = null, choices = [] } = {}) {
        currentRenderedAnswer = answer || "";
        currentRenderedMeta = meta || null;
        $("choices").innerHTML = "";
        setVoicePanelMode(mode);

        if (mode === "question") {
          renderQuestionState(answer);
        } else if (mode === "final" && meta) {
          $("result").innerHTML = `
            ${renderResultCard(meta, answer)}
            <div class="result-actions">
              <button id="copy-result" class="result-action">Copier la cotation</button>
              <button id="report-result" class="result-action icon" aria-label="Signaler une erreur">?</button>
            </div>
          `;
          attachResultActions(answer);
        } else {
          renderPlaceholderState();
        }

        choices.forEach((item) => {
          const button = document.createElement("button");
          button.className = "choice";
          button.textContent = polishDisplayText(item.label);
          button.addEventListener("click", () => submitMessage(item.value));
          $("choices").appendChild(button);
        });
      }

      function showScreen(screen) {
        $("screen-assistant").classList.toggle("active", screen === "assistant");
        $("screen-history").classList.toggle("active", screen === "history");
      }

      async function analyzeMessage() {
        const message = $("message").value.trim();
        await submitMessage(message);
      }

      async function submitMessage(message) {
        if (isSubmitting) {
          return;
        }
        if (!message) {
          $("status").textContent = "Saisis ou dicte un cas patient.";
          return;
        }

        isSubmitting = true;
        syncActionState();
        $("status").textContent = "Analyse en cours...";
        let data;
        try {
          const { response, data: responseData } = await fetchJsonWithDebug(
            "/api/analyze",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ message, context, attente }),
            },
            NETWORK_TIMEOUTS.analyze
          );
          data = responseData;
          if (response.status === 429) {
            $("status").textContent = "Trop de requêtes. Attendez quelques secondes.";
            return;
          }
          if (!response.ok) {
            $("status").textContent = data.error || "Erreur serveur.";
            return;
          }
        } catch (_) {
          $("status").textContent = "Connexion au serveur impossible.";
          return;
        } finally {
          isSubmitting = false;
          syncActionState();
        }

        context = data.context;
        attente = data.attente;
        conversationTurns.push({ role: "user", text: message });
        conversationTurns.push({ role: "assistant", text: data.answer });

        renderAssistantState({
          mode: data.done ? "final" : "question",
          answer: data.answer || "",
          meta: data.result_meta || null,
          choices: data.choices || [],
        });
        $("status").textContent = data.done
          ? "Réponse finale prête."
          : "Une précision est nécessaire.";

        if (data.done) {
          saveHistoryEntry(data.answer, data.result_meta || null);
          $("message").value = "";
          conversationTurns = [];
          context = "";
          attente = "";
        }
      }

      function saveHistoryEntry(answer, resultMeta) {
        const entries = getHistory();
        const title = String(getNextHistoryNumber());
        const entry = {
          title,
          prompt: conversationTurns.filter((turn) => turn.role === "user").map((turn) => turn.text).join(" -> "),
          turns: [...conversationTurns],
          answer,
          resultMeta,
          cotation: extractCotation(answer),
          createdAt: new Date().toISOString(),
        };
        entries.unshift(entry);
        setHistory(entries);
        renderHistory();
      }

      function loadHistoryEntry(index) {
        const entry = getHistory()[index];
        if (!entry) {
          return;
        }
        conversationTurns = Array.isArray(entry.turns) ? entry.turns : [];
        const lastUserTurn = [...conversationTurns].reverse().find((turn) => turn.role === "user");
        $("message").value = lastUserTurn ? lastUserTurn.text : entry.prompt;
        context = "";
        attente = "";
        $("status").textContent = "Cas rechargé depuis l'historique.";
        renderAssistantState({
          mode: entry.resultMeta ? "final" : "home",
          answer: entry.answer || "",
          meta: entry.resultMeta || null,
          choices: [],
        });
        showScreen("assistant");
      }

      function deleteHistoryEntry(index) {
        const entries = getHistory();
        entries.splice(index, 1);
        setHistory(entries);
        renderHistory();
      }

      function updateHistoryTitle(index, value) {
        const entries = getHistory();
        if (!entries[index]) {
          return;
        }
        entries[index].title = value.trim() || entries[index].title;
        setHistory(entries);
        renderHistory();
      }

      function renderHistory() {
        const container = $("history");
        const entries = getHistory();
        container.innerHTML = "";

        if (!entries.length) {
          container.innerHTML = `
            <section class="history-card">
              <div class="history-meta">Aucune cotation enregistrée pour le moment.</div>
            </section>
          `;
          return;
        }

        entries.forEach((entry, index) => {
          const box = document.createElement("article");
          box.className = "history-card";

          const titleInput = document.createElement("input");
          titleInput.className = "history-title-input";
          titleInput.type = "text";
          titleInput.value = entry.title;
          titleInput.addEventListener("change", () => updateHistoryTitle(index, titleInput.value));

          const meta = document.createElement("div");
          meta.className = "history-meta";
          meta.textContent = formatDate(entry.createdAt);

          const cotation = document.createElement("div");
          cotation.className = "history-meta";
          cotation.textContent = entry.cotation || "Cotation non extraite";

          const summary = document.createElement("div");
          summary.className = "history-meta";
          summary.textContent = `${(entry.turns || []).filter((turn) => turn.role === "user").length} message(s) utilisateur`;

          const pathSummary = document.createElement("div");
          pathSummary.className = "history-meta";
          pathSummary.textContent = entry.resultMeta && Array.isArray(entry.resultMeta.path)
            ? entry.resultMeta.path.join(" > ")
            : "Parcours non enregistré";

          const prompt = document.createElement("div");
          prompt.className = "history-prompt";
          prompt.textContent = polishDisplayText(entry.prompt);

          const actions = document.createElement("div");
          actions.className = "history-actions";

          const openButton = document.createElement("button");
          openButton.className = "history-action";
          openButton.textContent = "Recharger";
          openButton.addEventListener("click", () => loadHistoryEntry(index));

          const deleteButton = document.createElement("button");
          deleteButton.className = "button-danger";
          deleteButton.textContent = "Supprimer";
          deleteButton.addEventListener("click", () => deleteHistoryEntry(index));

          actions.appendChild(openButton);
          actions.appendChild(deleteButton);
          box.appendChild(titleInput);
          box.appendChild(meta);
          box.appendChild(cotation);
          box.appendChild(summary);
          box.appendChild(pathSummary);
          box.appendChild(prompt);
          box.appendChild(actions);
          container.appendChild(box);
        });
      }

      function setVoiceState({ listening = false, busy = false } = {}) {
        isListening = listening;
        isDictationBusy = busy;
        const voiceButton = $("voice");
        voiceButton.innerHTML = listening ? STOP_ICON : MIC_ICON;
        voiceButton.classList.toggle("active", listening);
        voiceButton.classList.toggle("busy", busy && !listening);
        voiceButton.setAttribute("aria-label", listening ? "Arrêter la dictée" : "Dicter");
        syncActionState();
      }

      function syncActionState() {
        $("analyze").disabled = isSubmitting;
        $("reset").disabled = isSubmitting;
        $("voice").disabled = isSubmitting || (isDictationBusy && !isListening);
      }

      function isIOSDevice() {
        return /iPhone|iPad|iPod/i.test(navigator.userAgent);
      }

      function postProcessTranscript(text) {
        return normalizeVoiceText(text)
          .replace(/\bre[ -]?education\b/g, "reeducation")
          .replace(/\bcotassion\b/g, "cotation")
          .replace(/\bcotacion\b/g, "cotation")
          .replace(/\bbondage\b/g, "bandage")
          .replace(/\bprotheses\b/g, "prothese")
          .replace(/\bepi ?condylite\b/g, "epicondylite")
          .replace(/\btendino?pathie\b/g, "tendinopathie")
          .replace(/\bn an opere\b/g, "non opere")
          .replace(/\bn en opere\b/g, "non opere")
          .replace(/\bnan opere\b/g, "non opere")
          .replace(/\bnon on operee\b/g, "non opere")
          .replace(/\bnom de operer\b/g, "non opere")
          .replace(/\bmon operer\b/g, "non opere")
          .replace(/\bdorsaux lombaire\b/g, "dorsal lombaire")
          .trim();
      }

      function scoreTranscript(text) {
        const normalized = normalizeVoiceText(text);
        let score = normalized.length;
        MEDICAL_HINTS.forEach((hint) => {
          if (normalized.includes(hint)) {
            score += 15;
          }
        });
        if (normalized.includes("non opere") || normalized.includes("non operee")) {
          score += 10;
        }
        if (normalized.includes("reeducation")) {
          score += 4;
        }
        return score;
      }

      function pickBestAlternative(result) {
        let bestTranscript = "";
        let bestScore = -1;

        for (let altIndex = 0; altIndex < result.length; altIndex += 1) {
          const transcript = result[altIndex].transcript.trim();
          const score = scoreTranscript(transcript);
          if (score > bestScore) {
            bestTranscript = transcript;
            bestScore = score;
          }
        }

        return bestTranscript;
      }

      function getDictationSupportSnapshot() {
        return {
          userAgent: navigator.userAgent,
          hasSpeechRecognition: Boolean(window.SpeechRecognition),
          hasWebkitSpeechRecognition: Boolean(window.webkitSpeechRecognition),
          hasMediaDevices: Boolean(navigator.mediaDevices),
          hasGetUserMedia: Boolean(navigator.mediaDevices && navigator.mediaDevices.getUserMedia),
          hasMediaRecorder: Boolean(window.MediaRecorder),
        };
      }

      function normalizeDictationError(error) {
        if (!error) {
          return { errorType: "unknown", message: "" };
        }
        if (typeof error === "string") {
          return { errorType: error.toLowerCase(), message: "" };
        }
        const rawType = String(error.error || error.name || "unknown").trim();
        return {
          errorType: rawType.toLowerCase(),
          message: String(error.message || error.detail || "").trim(),
        };
      }

      function chooseSupportedAudioMimeType() {
        const candidates = [
          "audio/mp4",
          "audio/mp4;codecs=mp4a.40.2",
          "audio/webm;codecs=opus",
          "audio/webm",
          "audio/ogg;codecs=opus",
        ];

        if (!window.MediaRecorder) {
          return { selectedMimeType: "", testedMimeTypes: candidates };
        }

        if (typeof window.MediaRecorder.isTypeSupported !== "function") {
          return { selectedMimeType: candidates[0], testedMimeTypes: candidates };
        }

        return {
          selectedMimeType: candidates.find((candidate) => window.MediaRecorder.isTypeSupported(candidate)) || "",
          testedMimeTypes: candidates,
        };
      }

      function audioFilenameForMimeType(mimeType) {
        const normalized = String(mimeType || "").toLowerCase();
        if (normalized.includes("mp4")) {
          return "dictation.m4a";
        }
        if (normalized.includes("ogg")) {
          return "dictation.ogg";
        }
        if (normalized.includes("mpeg") || normalized.includes("mp3")) {
          return "dictation.mp3";
        }
        if (normalized.includes("wav")) {
          return "dictation.wav";
        }
        return "dictation.webm";
      }

      function mapDictationErrorToStatus(error) {
        const { errorType, message } = normalizeDictationError(error);

        if (errorType === "not-allowed" || errorType === "service-not-allowed" || errorType === "notallowederror") {
          return "Micro refusé par le navigateur.";
        }
        if (errorType === "no-speech") {
          return "Aucune parole détectée. Réessaie plus près du micro.";
        }
        if (errorType === "audio-capture" || errorType === "notfounderror") {
          return "Aucun micro détecté par le navigateur.";
        }
        if (errorType === "notreadableerror") {
          return "Le micro est occupé ou illisible sur l'iPhone.";
        }
        if (errorType === "aborterror") {
          return "La capture audio a été interrompue.";
        }
        if (errorType === "media-recorder-unavailable") {
          return "Dictée indisponible : l'enregistrement audio n'est pas exploitable sur ce navigateur.";
        }
        if (errorType === "getusermedia-timeout") {
          return "La demande d'accès micro a expiré. Vérifie Safari puis réessaie.";
        }
        if (errorType === "get-user-media-unavailable" || errorType === "speech-recognition-unavailable") {
          return "Dictée indisponible sur ce navigateur.";
        }
        if (errorType === "transcription-server-error") {
          return message || "Le serveur de transcription a refusé l'audio.";
        }
        if (errorType === "transcription-empty") {
          return "Aucun texte n'a été détecté.";
        }
        if (errorType === "network-error") {
          return "Connexion au serveur de transcription impossible.";
        }
        if (errorType === "recording-empty") {
          return "Aucun audio exploitable n'a été capturé.";
        }
        if (errorType === "recording-too-short") {
          return "L'enregistrement est trop court pour une transcription fiable.";
        }
        if (errorType === "rate-limited") {
          return "Trop de requêtes. Attendez quelques secondes.";
        }

        return message ? `Erreur de dictée : ${message}` : `Erreur de dictée : ${errorType}`;
      }

      function createWebkitRecognitionEngine(controller) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let finalTranscript = "";
        let silenceTimer = null;
        let didStart = false;
        let didFinish = false;

        function clearSilenceTimer() {
          if (silenceTimer) {
            clearTimeout(silenceTimer);
            silenceTimer = null;
          }
        }

        function scheduleSilenceTimeout() {
          clearSilenceTimer();
          silenceTimer = setTimeout(() => {
            if (recognition && controller.getStopReason() !== "reset") {
              $("status").textContent = "Fin d'écoute. Analyse de la dictée...";
              recognition.stop();
            }
          }, 4000);
        }

        return {
          path: "webkitSpeechRecognition",
          start() {
            if (!SpeechRecognition) {
              return Promise.reject({ error: "speech-recognition-unavailable", message: "SpeechRecognition indisponible." });
            }

            finalTranscript = "";

            return new Promise((resolve, reject) => {
              recognition = new SpeechRecognition();
              recognition.lang = "fr-FR";
              recognition.interimResults = true;
              recognition.continuous = false;
              recognition.maxAlternatives = 3;

              recognition.onstart = () => {
                didStart = true;
                controller.onListening(this.path);
                scheduleSilenceTimeout();
                resolve();
              };

              recognition.onaudiostart = () => {
                scheduleSilenceTimeout();
              };

              recognition.onspeechstart = () => {
                $("status").textContent = "Écoute en cours...";
                scheduleSilenceTimeout();
              };

              recognition.onresult = (event) => {
                let interimTranscript = "";
                for (let index = event.resultIndex; index < event.results.length; index += 1) {
                  const transcript = pickBestAlternative(event.results[index]);
                  if (event.results[index].isFinal) {
                    finalTranscript = `${finalTranscript} ${postProcessTranscript(transcript)}`.trim();
                  } else {
                    interimTranscript = `${interimTranscript} ${postProcessTranscript(transcript)}`.trim();
                  }
                }

                $("message").value = finalTranscript || interimTranscript;
                $("status").textContent = finalTranscript ? "Écoute en cours..." : "Transcription en direct...";
                scheduleSilenceTimeout();
              };

              recognition.onerror = (event) => {
                if (didFinish) {
                  return;
                }
                didFinish = true;
                clearSilenceTimer();
                const normalizedError = {
                  error: event.error || "speech-recognition-error",
                  message: String(event.message || "").trim(),
                };
                if (!didStart) {
                  reject(normalizedError);
                  return;
                }
                controller.onEngineFailure(this.path, normalizedError);
              };

              recognition.onend = () => {
                if (didFinish) {
                  return;
                }
                didFinish = true;
                clearSilenceTimer();

                if (!didStart) {
                  reject({ error: "aborted", message: "SpeechRecognition terminé avant démarrage." });
                  return;
                }

                if (controller.getStopReason() === "reset") {
                  controller.onCancelled(this.path);
                  return;
                }

                const transcript = finalTranscript.trim() || $("message").value.trim();
                if (!transcript) {
                  controller.onEmptyTranscript(this.path);
                  return;
                }
                controller.onTranscriptReady(this.path, transcript);
              };

              try {
                recognition.start();
              } catch (error) {
                clearSilenceTimer();
                reject({
                  error: error.name || "speech-recognition-start-error",
                  message: String(error.message || "").trim(),
                });
              }
            });
          },
          stop(reason = "user") {
            clearSilenceTimer();
            if (!recognition) {
              return;
            }
            if (reason === "reset") {
              controller.markStopReason("reset");
            }
            try {
              recognition.stop();
            } catch (_) {}
          },
        };
      }

      function createAudioFallbackEngine(controller) {
        let stream = null;
        let recorder = null;
        let chunks = [];
        let stopTimer = null;
        let recordingMimeType = "";
        let testedMimeTypes = [];
        let startResolved = false;
        let recordStartedAt = 0;
        let pendingPermission = false;
        let cancelledBeforeStream = false;
        let permissionRequestTimedOut = false;

        function stopTracks() {
          if (!stream) {
            return;
          }
          stream.getTracks().forEach((track) => track.stop());
          stream = null;
        }

        function clearStopTimer() {
          if (stopTimer) {
            clearTimeout(stopTimer);
            stopTimer = null;
          }
        }

        return {
          path: "audioFallbackBackend",
          async start() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
              throw { error: "get-user-media-unavailable", message: "getUserMedia indisponible." };
            }
            if (!window.MediaRecorder) {
              throw { error: "media-recorder-unavailable", message: "MediaRecorder indisponible." };
            }

            controller.onInitializing(this.path);
            pendingPermission = true;
            cancelledBeforeStream = false;
            permissionRequestTimedOut = false;
            const pendingGetUserMedia = navigator.mediaDevices.getUserMedia({
              audio: {
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: true,
              },
            });

            pendingGetUserMedia.then((lateStream) => {
              if (!permissionRequestTimedOut && !cancelledBeforeStream) {
                return;
              }
              lateStream.getTracks().forEach((track) => track.stop());
            }).catch(() => {});

            try {
              stream = await Promise.race([
                pendingGetUserMedia,
                new Promise((_, reject) => {
                  setTimeout(() => reject({
                    error: "getusermedia-timeout",
                    message: "Permission micro en attente trop longtemps.",
                  }), 10000);
                }),
              ]);
            } catch (error) {
              if (normalizeDictationError(error).errorType === "getusermedia-timeout") {
                permissionRequestTimedOut = true;
              }
              throw error;
            } finally {
              pendingPermission = false;
            }

            if (cancelledBeforeStream) {
              stopTracks();
              throw { error: "cancelled", message: "Dictée annulée pendant l'autorisation micro." };
            }

            const mimeTypeChoice = chooseSupportedAudioMimeType();
            recordingMimeType = mimeTypeChoice.selectedMimeType;
            testedMimeTypes = mimeTypeChoice.testedMimeTypes;
            controller.logEvent("audio_mime_type_candidates", {
              path: this.path,
              tested_mime_types: testedMimeTypes,
              selected_mime_type: recordingMimeType,
            });
            try {
              recorder = recordingMimeType
                ? new MediaRecorder(stream, { mimeType: recordingMimeType })
                : new MediaRecorder(stream);
            } catch (error) {
              stopTracks();
              throw {
                error: error.name || "media-recorder-unavailable",
                message: String(error.message || "").trim(),
              };
            }
            chunks = [];
            startResolved = false;

            return new Promise((resolve, reject) => {
              recorder.ondataavailable = (event) => {
                if (event.data && event.data.size > 0) {
                  chunks.push(event.data);
                }
              };

              recorder.onstart = () => {
                startResolved = true;
                recordStartedAt = performance.now();
                controller.onListening(this.path);
                stopTimer = setTimeout(() => this.stop("auto"), AUTO_STOP_RECORDING_MS);
                resolve();
              };

              recorder.onerror = (event) => {
                clearStopTimer();
                stopTracks();
                const normalizedError = {
                  error: event.error?.name || "media-recorder-error",
                  message: String(event.error?.message || "").trim(),
                };
                if (!startResolved) {
                  reject(normalizedError);
                  return;
                }
                controller.onEngineFailure(this.path, normalizedError);
              };

              recorder.onstop = async () => {
                clearStopTimer();
                const shouldDiscard = controller.getStopReason() === "reset";
                const recordingDurationMs = recordStartedAt ? Math.round(performance.now() - recordStartedAt) : 0;
                const blob = new Blob(chunks, {
                  type: recorder.mimeType || recordingMimeType || "application/octet-stream",
                });
                stopTracks();

                if (!startResolved) {
                  reject({ error: "recording-start-failed", message: "L'enregistrement audio n'a pas démarré." });
                  return;
                }

                if (shouldDiscard) {
                  controller.onCancelled(this.path);
                  return;
                }

                if (!blob.size) {
                  controller.onEngineFailure(this.path, {
                    error: "recording-empty",
                    message: "Aucun bloc audio reçu par MediaRecorder.",
                  });
                  return;
                }

                if (recordingDurationMs < 600 && blob.size < 2048) {
                  controller.onEngineFailure(this.path, {
                    error: "recording-too-short",
                    message: "Audio trop court pour une transcription stable.",
                  });
                  return;
                }

                controller.onSendingAudio(this.path, {
                  selected_mime_type: recorder.mimeType || recordingMimeType || "application/octet-stream",
                  tested_mime_types: testedMimeTypes,
                  recording_duration_ms: recordingDurationMs,
                  audio_blob_size: blob.size,
                });
                try {
                  const transcript = await controller.transcribeAudio(blob, {
                    selectedMimeType: recorder.mimeType || recordingMimeType || "application/octet-stream",
                    testedMimeTypes,
                    recordingDurationMs,
                  });
                  controller.onTranscriptReady(this.path, transcript);
                } catch (error) {
                  controller.onEngineFailure(this.path, error);
                }
              };

              try {
                recorder.start();
              } catch (error) {
                clearStopTimer();
                stopTracks();
                reject({
                  error: error.name || "media-recorder-start-error",
                  message: String(error.message || "").trim(),
                });
              }
            });
          },
          stop(reason = "user") {
            clearStopTimer();
            if (reason === "reset") {
              controller.markStopReason("reset");
            }
            if (pendingPermission) {
              cancelledBeforeStream = true;
            }
            if (recorder && recorder.state !== "inactive") {
              try {
                recorder.stop();
              } catch (_) {
                stopTracks();
              }
              return;
            }
            stopTracks();
          },
        };
      }

      function createDictationService() {
        let activeEngine = null;
        let activeSession = null;
        let fallbackQueue = [];

        function getDurationMs() {
          return activeSession ? Math.round(performance.now() - activeSession.startedAt) : 0;
        }

        function resetState() {
          activeEngine = null;
          activeSession = null;
          fallbackQueue = [];
          if (window._recordingTimer) {
            clearInterval(window._recordingTimer);
            window._recordingTimer = null;
          }
          setVoiceState({ listening: false, busy: false });
        }

        function log(type, extra = {}) {
          const payload = {
            type,
            timestamp: new Date().toISOString(),
            duration_ms: getDurationMs(),
            path: activeSession?.path || extra.path || "",
            ...getDictationSupportSnapshot(),
            ...extra,
          };
          window.__ngapDictationLogs = window.__ngapDictationLogs || [];
          window.__ngapDictationLogs.push(payload);
          if (window.__ngapDictationLogs.length > 100) {
            window.__ngapDictationLogs.shift();
          }
          if (DEBUG_LOGS) {
            console.log("[dictation]", payload);
          }
        }

        function canUseWebkitRecognition() {
          return Boolean(window.SpeechRecognition || window.webkitSpeechRecognition);
        }

        function canUseAudioFallback() {
          return Boolean(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder);
        }

        function buildEngineOrder() {
          if (isIOSDevice()) {
            const forcedOrder = [
              canUseAudioFallback() ? "audioFallbackBackend" : "",
            ].filter(Boolean);
            log("engine_forced_ios", {
              forced_path: forcedOrder[0] || "",
              audio_fallback_available: canUseAudioFallback(),
              webkit_available: canUseWebkitRecognition(),
            });
            return forcedOrder;
          }

          return [
            canUseWebkitRecognition() ? "webkitSpeechRecognition" : "",
            canUseAudioFallback() ? "audioFallbackBackend" : "",
          ].filter(Boolean);
        }

        function createEngine(path) {
          if (path === "webkitSpeechRecognition") {
            return createWebkitRecognitionEngine(service);
          }
          if (path === "audioFallbackBackend") {
            return createAudioFallbackEngine(service);
          }
          return null;
        }

        async function startEngine(path) {
          const engine = createEngine(path);
          if (!engine) {
            throw { error: "engine-unavailable", message: `Moteur introuvable: ${path}` };
          }

          activeSession = {
            path,
            startedAt: performance.now(),
            stopReason: "",
          };
          activeEngine = engine;
          setVoiceState({ listening: false, busy: true });
          log("engine_selected", { path });
          await engine.start();
        }

        async function fallbackOrFail(error, fromPath) {
          const normalizedError = normalizeDictationError(error);
          log("engine_failed", {
            path: fromPath,
            error_type: normalizedError.errorType,
            error_message: normalizedError.message,
          });

          const nextPath = fallbackQueue.shift();
          resetState();

          if (nextPath) {
            $("status").textContent = "Bascule vers la capture audio de secours...";
            log("engine_fallback", { from_path: fromPath, to_path: nextPath });
            try {
              await startEngine(nextPath);
              return;
            } catch (fallbackError) {
              await fallbackOrFail(fallbackError, nextPath);
              return;
            }
          }

          $("status").textContent = mapDictationErrorToStatus(error);
        }

        const service = {
          logEvent(type, extra = {}) {
            log(type, extra);
          },
          getStopReason() {
            return activeSession?.stopReason || "";
          },
          markStopReason(reason) {
            if (activeSession) {
              activeSession.stopReason = reason;
            }
          },
          onInitializing(path) {
            setVoiceState({ listening: false, busy: true });
            $("status").textContent = "Initialisation micro...";
            log("initializing_micro", { path });
          },
          onListening(path) {
            setVoiceState({ listening: true, busy: true });
            let seconds = 0;
            if (window._recordingTimer) {
              clearInterval(window._recordingTimer);
            }
            const renderStatus = () => {
              const remaining = Math.max(0, Math.round(AUTO_STOP_RECORDING_MS / 1000) - seconds);
              $("status").textContent = `Écoute en cours (${remaining}s)...`;
            };
            renderStatus();
            window._recordingTimer = setInterval(() => {
              seconds += 1;
              renderStatus();
            }, 1000);
            log("listening_started", { path });
          },
          onSendingAudio(path, extra = {}) {
            setVoiceState({ listening: false, busy: true });
            $("status").textContent = "Envoi audio...";
            log("audio_upload_preparing", { path, ...extra });
          },
          onTranscribing(path) {
            setVoiceState({ listening: false, busy: true });
            $("status").textContent = "Transcription en cours...";
            log("transcription_started", { path });
          },
          async transcribeAudio(blob, metadata = {}) {
            this.onTranscribing("audioFallbackBackend");
            log("audio_upload_started", {
              path: "audioFallbackBackend",
              mime_type: blob.type || "application/octet-stream",
              audio_size: blob.size,
              recording_duration_ms: metadata.recordingDurationMs || 0,
              tested_mime_types: metadata.testedMimeTypes || [],
            });

            let response;
            let data = {};
            const formData = new FormData();
            formData.append("audio", blob, audioFilenameForMimeType(metadata.selectedMimeType || blob.type || ""));
            formData.append("language", "fr-FR");
            formData.append("recording_duration_ms", String(metadata.recordingDurationMs || 0));
            formData.append("selected_mime_type", metadata.selectedMimeType || blob.type || "application/octet-stream");
            formData.append("tested_mime_types", JSON.stringify(metadata.testedMimeTypes || []));
            try {
              const result = await fetchJsonWithDebug(
                "/api/transcribe",
                {
                  method: "POST",
                  body: formData,
                },
                NETWORK_TIMEOUTS.transcribe
              );
              response = result.response;
              data = result.data;
            } catch (_) {
              throw { error: "network-error", message: "Connexion impossible pendant l'envoi audio." };
            }

            if (response.status === 429) {
              throw { error: "rate-limited", message: "Trop de requêtes. Attendez quelques secondes." };
            }
            if (!response.ok) {
              throw {
                error: "transcription-server-error",
                message: data.error || "La transcription serveur a échoué.",
              };
            }

            const transcript = String(data.text || "").trim();
            if (!transcript) {
              throw { error: "transcription-empty", message: "Le serveur n'a retourné aucun texte." };
            }

            log("audio_upload_succeeded", {
              path: "audioFallbackBackend",
              provider: data.provider || "",
            });
            return transcript;
          },
          async onTranscriptReady(path, transcript) {
            const cleanedTranscript = postProcessTranscript(String(transcript || "")).trim();
            log("transcript_ready", {
              path,
              transcript_length: cleanedTranscript.length,
            });
            resetState();

            if (!cleanedTranscript) {
              $("status").textContent = "Aucun texte n'a été détecté.";
              return;
            }

            $("status").textContent = "Texte reçu.";
            $("message").value = cleanedTranscript;
            await submitMessage(cleanedTranscript);
          },
          async onEngineFailure(path, error) {
            await fallbackOrFail(error, path);
          },
          onEmptyTranscript(path) {
            log("empty_transcript", { path });
            resetState();
            $("status").textContent = "Aucun texte n'a été détecté.";
          },
          onCancelled(path) {
            log("dictation_cancelled", { path, stop_reason: this.getStopReason() });
            resetState();
          },
          async toggleFromUserGesture() {
            if (isSubmitting) {
              return;
            }

            if (activeEngine) {
              log("stop_requested", { path: activeSession?.path || "" });
              activeEngine.stop("user");
              return;
            }

            $("message").value = "";
            const order = buildEngineOrder();
            log("availability_snapshot", { engine_order: order.join(",") });

            if (!order.length) {
              setVoiceState({ listening: false, busy: false });
              $("status").textContent = "Dictée indisponible : l'enregistrement audio navigateur n'est pas exploitable sur cet appareil.";
              log("dictation_unavailable");
              return;
            }

            fallbackQueue = order.slice(1);
            try {
              await startEngine(order[0]);
            } catch (error) {
              await fallbackOrFail(error, order[0]);
            }
          },
          stopDictation() {
            if (!activeEngine) {
              return;
            }
            activeEngine.stop("user");
          },
          cancelDictation() {
            if (!activeEngine) {
              setVoiceState({ listening: false, busy: false });
              return;
            }
            this.markStopReason("reset");
            activeEngine.stop("reset");
          },
          startDictation() {
            return this.toggleFromUserGesture();
          },
        };

        return service;
      }

      const dictationService = createDictationService();

      function toggleVoice() {
        dictationService.startDictation();
      }

      function resetConversation() {
        dictationService.cancelDictation();
        context = "";
        attente = "";
        conversationTurns = [];
        currentRenderedAnswer = "";
        currentRenderedMeta = null;
        $("message").value = "";
        $("status").textContent = "Session réinitialisée.";
        renderAssistantState({ mode: "home" });
      }

      $("analyze").addEventListener("click", analyzeMessage);
      $("voice").addEventListener("click", toggleVoice);
      $("reset").addEventListener("click", resetConversation);
      $("history-link").addEventListener("click", () => showScreen("history"));
      $("history-back").addEventListener("click", () => showScreen("assistant"));
      $("message").addEventListener("keydown", (event) => {
        if (event.key === "Enter" && (event.metaKey || event.ctrlKey)) {
          event.preventDefault();
          analyzeMessage();
        }
      });

      renderHistory();
      renderAssistantState({ mode: "home" });
      setVoiceState({ listening: false, busy: false });
      syncActionState();

      if ("serviceWorker" in navigator) {
        const isLocalhost = ["127.0.0.1", "localhost"].includes(window.location.hostname);
        if (isLocalhost) {
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            registrations.forEach((registration) => registration.unregister());
          }).catch(() => {});
        } else {
          navigator.serviceWorker.register("/service-worker.js?v=20260320").catch(() => {});
        }
      }
    </script>
  </body>
